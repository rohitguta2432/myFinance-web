version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci
        - env | grep -e NEXT_PUBLIC_SUPABASE_URL -e NEXT_PUBLIC_SUPABASE_ANON_KEY -e SUPABASE_SERVICE_ROLE_KEY -e ADMIN_USERNAME -e ADMIN_PASSWORD -e BEDROCK_REGION -e BEDROCK_ACCESS_KEY_ID -e BEDROCK_SECRET_ACCESS_KEY >> .env.production
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .next/cache/**/*
